<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toast Notification</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/38e6d61a92.js" crossorigin="anonymous"></script>
</head>

<body>
    <div class="container">
        <h1><span>Toast</span><br>Notification</h1>
        <h2>using JavaScript</h2>
        <div class="buttons">
            <button onclick="showToast(success)">Success</button>
            <button onclick="showToast(error)">Error</button>
            <button onclick="showToast(invalid)">Invalid</button>
        </div>
        <div id="toast-box"></div>
    </div>
    
    <script src="script.js"></script>
</body>

</html>
